name: Deploy to GitHub Pages

# 每次推送到預設分支就自動部署；也可在 Actions 頁面手動觸發
on:
  push:
    branches: ["claude/city-building-game-p15t1i"]
  workflow_dispatch:

# Pages 部署需要的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，避免互相覆蓋
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true 會自動幫這個 repo 開啟 GitHub Pages，不用手動設定
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 把整個專案（靜態網站）打包上傳
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
