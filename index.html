<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#5ba049" />
  <title>迷你動物園</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 上方資訊列 -->
  <header id="topbar">
    <div class="stat"><span class="label">💰 資金</span><span id="stat-money" class="value">0</span></div>
    <div class="stat"><span class="label">🧑‍🤝‍🧑 遊客</span><span id="stat-visitors" class="value">0</span></div>
    <div class="stat"><span class="label">📅 天數</span><span id="stat-day" class="value">1</span></div>
    <div class="stat"><span class="label">✨ 魅力</span><span id="stat-attr" class="value">0</span></div>
  </header>

  <!-- 右上選單 -->
  <div id="menu-area">
    <button id="btn-menu" title="選單">☰</button>
    <div id="menu-panel" class="hidden">
      <button id="btn-save">💾 立即存檔</button>
      <button id="btn-load">📂 讀取存檔</button>
      <button id="btn-export">⬇️ 匯出存檔</button>
      <button id="btn-import">⬆️ 匯入存檔</button>
      <button id="btn-new">🆕 重新開始</button>
      <hr />
      <div class="hint">選工具後點地圖放置。<br/>遊客只走「步道」，記得把步道連到獸欄與商店！<br/>拖曳平移、滾輪/雙指縮放。</div>
    </div>
  </div>

  <!-- 縮放按鈕 -->
  <div id="zoom">
    <button id="btn-zoomin" title="放大">＋</button>
    <button id="btn-zoomout" title="縮小">－</button>
  </div>

  <!-- 底部工具列 -->
  <nav id="toolbar">
    <button class="tool" data-tool="path" title="步道">🟫<small>步道</small></button>
    <button class="tool" data-tool="enclosure" title="獸欄">🦁<small>獸欄</small></button>
    <button class="tool" data-tool="cafe" title="咖啡廳">☕<small>咖啡</small></button>
    <button class="tool" data-tool="souvenir" title="紀念品店">🎁<small>紀念品</small></button>
    <button class="tool" data-tool="tree" title="樹木">🌳<small>樹木</small></button>
    <button class="tool" data-tool="bulldoze" title="拆除">🚧<small>拆除</small></button>
  </nav>

  <div id="toast" class="hidden"></div>
  <input type="file" id="file-input" accept="application/json" hidden />
  <script src="vendor/phaser.min.js"></script>
  <script type="module" src="js/phaser-main.js"></script>
</body>
</html>
