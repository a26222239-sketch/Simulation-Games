<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#5ba049" />
  <title>迷你農場</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 上方資訊列 -->
  <header id="topbar">
    <div class="stat"><span class="label">💰 資金</span><span id="stat-money" class="value">0</span></div>
    <div class="stat"><span class="label">📅 天數</span><span id="stat-day" class="value">1</span></div>
    <div class="stat"><span class="label">🎒 庫存</span><span id="stat-inv" class="value">0</span></div>
    <div class="stat"><span class="label">📍 位置</span><span id="stat-scene" class="value">農場</span></div>
  </header>

  <!-- 右側動作按鈕 -->
  <div id="actions">
    <button id="btn-sleep" title="睡覺/下一天">💤</button>
    <button id="btn-travel" title="進城/回農場">🏘️</button>
    <button id="btn-face" title="捏臉">👤</button>
    <button id="btn-wardrobe" title="衣櫃換裝">👕</button>
    <button id="btn-menu" title="選單">☰</button>
    <div id="menu-panel" class="hidden">
      <button id="btn-save">💾 立即存檔</button>
      <button id="btn-load">📂 讀取存檔</button>
      <button id="btn-export">⬇️ 匯出存檔</button>
      <button id="btn-import">⬆️ 匯入存檔</button>
      <button id="btn-new">🆕 重新開始</button>
    </div>
  </div>

  <!-- 左下虛擬搖桿 -->
  <div id="joy"><div id="joy-stick"></div></div>

  <!-- 底部工具列 -->
  <nav id="toolbar">
    <button class="tool" data-tool="hoe" title="鋤地">⛏️<small>鋤地</small></button>
    <button class="tool" data-tool="seed" title="種植">🌱<small>種植</small></button>
    <button class="tool" data-tool="water" title="澆水">💧<small>澆水</small></button>
    <button class="tool" data-tool="interact" title="互動/收成">✋<small>收成</small></button>
    <button id="btn-build" class="tool" title="建造/畜牧">🏗️<small>建造</small></button>
  </nav>

  <div id="toast" class="hidden"></div>
  <input type="file" id="file-input" accept="application/json" hidden />
  <script type="module" src="js/main.js"></script>
</body>
</html>
