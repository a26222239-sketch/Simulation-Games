<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1b2838" />
  <title>迷你商店經營</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 上方資訊列 -->
  <header id="topbar">
    <div class="stat"><span class="label">💰 資金</span><span id="stat-money" class="value">0</span></div>
    <div class="stat"><span class="label">🛒 店內</span><span id="stat-instore" class="value">0</span></div>
    <div class="stat"><span class="label">✅ 已服務</span><span id="stat-served" class="value">0</span></div>
    <div class="stat"><span class="label">🚪 狀態</span><span id="stat-open" class="value">營業中</span></div>
  </header>

  <!-- 下方工具列：編輯店面 -->
  <nav id="toolbar">
    <button class="tool" data-tool="shelf"   title="貨架">🟪<small>貨架</small></button>
    <button class="tool" data-tool="counter" title="櫃台">🟩<small>櫃台</small></button>
    <button class="tool" data-tool="wall"    title="牆">🧱<small>牆</small></button>
    <button class="tool" data-tool="door"    title="門">🚪<small>門</small></button>
    <button class="tool" data-tool="floor"   title="清除(地板)">🧹<small>清除</small></button>
  </nav>

  <!-- 右上選單 -->
  <div id="menu-area">
    <button id="btn-menu" title="選單">☰</button>
    <div id="menu-panel" class="hidden">
      <button id="btn-toggle-open">🚪 暫停 / 開始營業</button>
      <button id="btn-save">💾 立即存檔</button>
      <button id="btn-load">📂 讀取存檔</button>
      <button id="btn-export">⬇️ 匯出存檔檔</button>
      <button id="btn-import">⬆️ 匯入存檔檔</button>
      <button id="btn-new">🆕 重設店面</button>
      <hr />
      <div class="hint">選工具後點格子佈置店面。<br/>顧客會自己進門逛貨架、到櫃台結帳。<br/>拖曳空白處平移，滾輪 / 雙指縮放。</div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>
  <input type="file" id="file-input" accept="application/json" hidden />
  <script type="module" src="js/main.js"></script>
</body>
</html>
